name: 🐛 Bug Report
description: Report a bug or unexpected behavior in ZerithDB
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
 
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as completely as possible so we can reproduce and fix the issue quickly.
 
  - type: textarea
    id: description
    attributes:
      label: 📋 Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what went wrong...
    validations:
      required: true
 
  - type: textarea
    id: reproduction-steps
    attributes:
      label: 🔁 Reproduction Steps
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Initialize ZerithDB with `...`
        2. Run the query `...`
        3. Observe the error `...`
    validations:
      required: true
 
  - type: textarea
    id: expected-behavior
    attributes:
      label: ✅ Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected to happen instead...
    validations:
      required: true
 
  - type: textarea
    id: actual-behavior
    attributes:
      label: ❌ Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
      placeholder: Paste error output or describe the unexpected result...
    validations:
      required: true
 
  - type: markdown
    attributes:
      value: "## 🖥️ Environment"
 
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running ZerithDB on?
      options:
        - Windows
        - macOS
        - Ubuntu / Debian
        - Fedora / RHEL / CentOS
        - Other Linux
        - Other (specify in additional context)
    validations:
      required: true
 
  - type: dropdown
    id: node-version
    attributes:
      label: Node.js Version
      description: Which version of Node.js are you using? Run `node --version` to check.
      options:
        - "22.x (LTS)"
        - "20.x (LTS)"
        - "Other (specify in additional context)"
    validations:
      required: true
 
  - type: input
    id: zerithdb-version
    attributes:
      label: ZerithDB Version
      description: What version of ZerithDB are you using?
      placeholder: e.g. 1.2.3
    validations:
      required: true
 
  - type: textarea
    id: additional-context
    attributes:
      label: 📎 Additional Context
      description: Add any other context, screenshots, or logs that might help diagnose the issue.
      placeholder: Paste logs, screenshots, config snippets, etc.
    validations:
      required: false
 
  - type: checkboxes
    id: checklist
    attributes:
      label: ✔️ Checklist
      options:
        - label: I have searched existing issues to make sure this bug has not already been reported.
          required: true
        - label: I have included all relevant information above.
          required: true
        - label: I am using a supported version of Node.js and ZerithDB.
          required: false
 