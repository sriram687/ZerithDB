name: Level Labeler Trigger

on:
  pull_request:
    types: [opened, synchronized]
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  check-level:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Level
        uses: actions/github-script@v7
        with:
          script: |
            let level = null;
            const eventName = context.eventName;
            const payload = context.payload;
            const targetNumber = context.issue.number;

            console.log(`Event: ${eventName}, Target: #${targetNumber}`);

            const criticalKeywords = ['crash', 'data loss', 'vulnerability', 'security', 'broken', 'urgent', 'blocker'];
            const advancedKeywords = ['performance', 'architecture', 'optimization', 'race condition', 'memory leak', 'indexing'];
            const beginnerKeywords = ['documentation', 'typo', 'readme', 'docs', 'fix typo', 'grammar', 'spelling'];

            if (eventName === 'issue_comment') {
              const body = payload.comment.body.trim();
              const association = payload.comment.author_association;
              const isTrusted = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(association);

              if (body.startsWith('/addlevel ') && isTrusted) {
                const requestedLevel = body.split(' ')[1].toLowerCase();
                const validLevels = ['beginner', 'intermediate', 'advanced', 'critical'];
                if (validLevels.includes(requestedLevel)) {
                  level = `level:${requestedLevel}`;
                }
              }
            } else {
              // Automatic detection for PRs and Issues
              const title = (payload.pull_request || payload.issue).title.toLowerCase();
              const body = ((payload.pull_request || payload.issue).body || '').toLowerCase();
              const content = `${title} ${body}`;

              // Check for keywords first (Priority: Critical > Advanced > Beginner)
              if (criticalKeywords.some(k => content.includes(k))) {
                level = 'level:critical';
              } else if (advancedKeywords.some(k => content.includes(k))) {
                level = 'level:advanced';
              } else if (beginnerKeywords.some(k => content.includes(k))) {
                level = 'level:beginner';
              }

              // Special case for PRs: Directory-based detection as a fallback or refinement
              if (eventName === 'pull_request' && !level) {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: targetNumber,
                });

                const paths = files.map(f => f.filename);
                const advancedPaths = ['packages/db/', 'packages/core/', 'packages/sync/', 'packages/network/', 'packages/storage/'];
                const intermediatePaths = ['packages/react/', 'packages/solid/', 'packages/vue/', 'packages/cli/', 'packages/auth/', 'packages/sdk/'];
                
                if (paths.some(p => advancedPaths.some(ap => p.startsWith(ap)))) {
                  level = 'level:advanced';
                } else if (paths.some(p => intermediatePaths.some(ip => p.startsWith(ip)))) {
                  level = 'level:intermediate';
                } else {
                  level = 'level:beginner';
                }
              }

              // Default for issues if no keywords matched
              if (eventName === 'issues' && !level) {
                const labels = payload.issue.labels.map(l => l.name.toLowerCase());
                if (labels.includes('good-first-issue')) {
                  level = 'level:beginner';
                } else if (labels.includes('bug')) {
                  level = 'level:intermediate';
                }
              }
            }

            if (level) {
              const fs = require('fs');
              fs.writeFileSync('level.txt', level);
              fs.writeFileSync('number.txt', targetNumber.toString());
              console.log(`Assigned level: ${level}`);
            } else {
              console.log('No level determined.');
            }

      - name: Upload info
        uses: actions/upload-artifact@v4
        with:
          name: level-info
          path: |
            level.txt
            number.txt
          retention-days: 1
        continue-on-error: true
