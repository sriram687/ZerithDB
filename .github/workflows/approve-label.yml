name: Approve Label Trigger

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  check-trigger:
    # Only run for trusted reviewers (Maintainers)
    if: |
      (github.event_name == 'pull_request_review' && 
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issue_comment' && 
       github.event.issue.pull_request && 
       startsWith(github.event.comment.body, '/approve') && 
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    steps:
      - name: Save review info
        run: |
          if [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            echo "${{ github.event.pull_request.number }}" > pr_number.txt
            echo "${{ github.event.review.state }}" > state.txt
          else
            echo "${{ github.event.issue.number }}" > pr_number.txt
            echo "command_approve" > state.txt
          fi

      - name: Upload review info
        uses: actions/upload-artifact@v4
        with:
          name: review-info
          path: |
            pr_number.txt
            state.txt
          retention-days: 1
